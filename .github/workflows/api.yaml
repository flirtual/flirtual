on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-type: strict
        version-file: apps/api/.tool-versions

    - name: Cache deps
      id: cache-deps
      uses: actions/cache@v6
      env:
        cache-name: cache-elixir-deps
      with:
        path: apps/api/deps
        key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.cache-name }}-

    - name: Cache compiled build
      id: cache-build
      uses: actions/cache@v6
      env:
        cache-name: cache-compiled-build
      with:
        path: apps/api/_build
        key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.cache-name }}-
          ${{ runner.os }}-mix-

    - name: Clean to rule out incremental build as a source of flakiness
      if: github.run_attempt != '1'
      run: |
        mix deps.clean --all
        mix clean
      shell: sh

    - name: Install dependencies
      run: mix deps.get

    - name: Compiles without warnings
      run: mix compile

    - name: Mix check
      run: mix check --except compiler

  image:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: registry.fly.io/flirtual:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  preview:
    if: github.ref != 'refs/heads/production' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: [image]
    environment:
      name: canary
      url: ${{ steps.preview.outputs.url }}
    runs-on: ubuntu-latest
    env:
      FLY_APP: flirtual-canary
      FLY_IMAGE: registry.fly.io/flirtual:${{ github.sha }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Compute preview label
        id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            label="$PR_NUMBER"
          else
            label="${GITHUB_SHA::7}"
          fi
          echo "PREVIEW_LABEL=$label" >> "$GITHUB_ENV"
          echo "url=https://api-$label.flirtual.dev" >> "$GITHUB_OUTPUT"

      - name: Migrate
        run: flyctl machine run "$FLY_IMAGE" -a "$FLY_APP" --rm --restart no /app/bin/migrate

      - name: Run preview machine
        run: |
          name="preview-$PREVIEW_LABEL"

          machine_id() {
            flyctl machines list -a "$FLY_APP" --json | jq -r --arg n "$name" '.[] | select(.name == $n) | .id'
          }

          discard() {
            id=$(machine_id)
            if [ -n "$id" ]; then
              flyctl machine destroy "$id" -a "$FLY_APP" --force || true
            fi
          }

          # A Machine occasionally lands on a host that cannot unpack the image
          # and crash-loops on a missing /app/bin/server. Fly still reports the
          # host as healthy, so the only recourse is another host.
          discard

          for attempt in 1 2 3; do
            if flyctl machine run "$FLY_IMAGE" -a "$FLY_APP" \
              --name "$name" \
              --region iad \
              --port 443:4000/tcp:http:tls \
              --autostart --autostop=stop \
              --vm-memory 1024 \
              --env GIT_COMMIT_SHA="$GITHUB_SHA" \
              --env ORIGIN="https://api-$PREVIEW_LABEL.flirtual.dev" \
              --env FRONTEND_ORIGIN="https://$PREVIEW_LABEL.flirtual.dev" \
              --env ROOT_ORIGIN=https://flirtual.dev; then
              break
            fi

            if [ "$attempt" = 3 ]; then
              echo "::error::preview machine failed to boot after $attempt attempts"
              exit 1
            fi

            echo "::warning::preview machine failed to boot, retrying on another host"
            discard
          done

          echo "PREVIEW_MACHINE=$(machine_id)" >> "$GITHUB_ENV"

      - name: Point the router at this preview
        env:
          KV_NAMESPACE: 413cd83515854c738f758131b600fee2
        run: |
          kv_put() {
            curl -sfX PUT \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE/values/$1" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -F value="$2" -F metadata='{}' > /dev/null
          }

          kv_put "machine-$PREVIEW_LABEL" "$PREVIEW_MACHINE"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            kv_put latest-api "$PREVIEW_LABEL"
          fi

      - name: Reap superseded previews
        env:
          KV_NAMESPACE: 413cd83515854c738f758131b600fee2
          KEEP: "20"
        run: |
          stale=$(flyctl machines list -a "$FLY_APP" --json | jq -r --argjson keep "$KEEP" '
            [.[] | select(.name | startswith("preview-"))]
            | sort_by(.updated_at)
            | reverse
            | .[$keep:][]
            | "\(.id) \(.name)"
          ')

          if [ -z "$stale" ]; then
            exit 0
          fi

          printf '%s\n' "$stale" | while read -r id name; do
            label="${name#preview-}"
            if [ "$label" = "$PREVIEW_LABEL" ]; then
              continue
            fi

            flyctl machine destroy "$id" -a "$FLY_APP" --force || true
            curl -sfX DELETE \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE/values/machine-$label" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" > /dev/null || true
          done

  deploy-production:
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    needs: [image]
    environment:
      name: production
      url: https://api.flirtu.al
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          GIT_COMMIT_SHA=$(git rev-parse HEAD)
          flyctl deploy --image registry.fly.io/flirtual:${{ github.sha }} --env GIT_COMMIT_SHA="$GIT_COMMIT_SHA"
        working-directory: ./apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
