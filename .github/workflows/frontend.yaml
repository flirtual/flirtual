on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v7

      - run: echo "::add-matcher::.github/annotation-eslint.json"

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          package_json_file: apps/frontend/package.json
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: ESLint
        run: ./node_modules/.bin/eslint -f stylish

  typescript:
    strategy:
      matrix:
        environment: [production, canary]
        exclude:
          - environment: ${{ github.ref != 'refs/heads/production' && 'production' || null }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      checks: write
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v7

      - run: echo "::add-matcher::.github/annotation-typescript.json"

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          package_json_file: apps/frontend/package.json
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Typegen
        env:
          VITE_ORIGIN: ${{ vars.VITE_ORIGIN }}
          VITE_SENTRY_ORGANIZATION: ${{ vars.VITE_SENTRY_ORGANIZATION }}
          VITE_SENTRY_PROJECT_ID: ${{ vars.VITE_SENTRY_PROJECT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm typegen

      - name: TypeScript
        run: |
          ./node_modules/.bin/tsc --pretty false --noEmit | sed -E "s#^.+\(.+\): error TS.+\$#$PWD/\0#"
          exit ${PIPESTATUS[0]}

  release:
    strategy:
      matrix:
        environment: [production, canary]
        exclude:
          - environment: ${{ github.ref != 'refs/heads/production' && 'production' || null }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write
    environment:
      name: ${{ matrix.environment }}
      url: ${{ steps.preview.outputs.url }}
    defaults:
      run:
        working-directory: apps/frontend
    env:
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      VITE_TALKJS_APP_ID: ${{ vars.VITE_TALKJS_APP_ID }}
      VITE_CHARGEBEE_NAMESPACE: ${{ vars.VITE_CHARGEBEE_NAMESPACE }}
      VITE_RC_APPL_PUBLIC_KEY: ${{ vars.VITE_RC_APPL_PUBLIC_KEY }}
      VITE_RC_GOOG_PUBLIC_KEY: ${{ vars.VITE_RC_GOOG_PUBLIC_KEY }}
      VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
      VITE_SENTRY_ORGANIZATION: ${{ vars.VITE_SENTRY_ORGANIZATION }}
      VITE_SENTRY_PROJECT_ID: ${{ vars.VITE_SENTRY_PROJECT_ID }}
      VITE_SENTRY_REPORT_TO: ${{ vars.VITE_SENTRY_REPORT_TO }}
      VITE_SENTRY_TRACES: ${{ vars.VITE_SENTRY_TRACES }}
      VITE_SENTRY_LOGS: ${{ vars.VITE_SENTRY_LOGS }}
      VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
      VITE_CLOUDFLARE_BEACON_ID: ${{ vars.VITE_CLOUDFLARE_BEACON_ID }}
      VITE_FRESHWORKS_WIDGET_ID: ${{ vars.VITE_FRESHWORKS_WIDGET_ID }}
      VITE_UPPY_COMPANION_URL: ${{ vars.VITE_UPPY_COMPANION_URL }}
      VITE_UPPY_BUCKET_ORIGIN: ${{ vars.VITE_UPPY_BUCKET_ORIGIN }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_ORIGIN: ${{ vars.VITE_ORIGIN }}
      VITE_APP_BUNDLE_ID: ${{ vars.VITE_APP_BUNDLE_ID }}
      VITE_PICO_APP_ID: ${{ vars.VITE_PICO_APP_ID }}
      VITE_PLATFORM_OVERRIDE: ${{ vars.VITE_PLATFORM_OVERRIDE }}
      VITE_BUCKET_CONTENT_ORIGIN: ${{ vars.VITE_BUCKET_CONTENT_ORIGIN }}
      VITE_BUCKET_UPLOADS_ORIGIN: ${{ vars.VITE_BUCKET_UPLOADS_ORIGIN }}
      VITE_BUCKET_UPLOADS_SIGNED_ORIGIN: ${{ vars.VITE_BUCKET_UPLOADS_SIGNED_ORIGIN }}
      VITE_ASSETLINKS_JSON: ${{ vars.VITE_ASSETLINKS_JSON }}
      VITE_APPLE_APP_SITE_ASSOCIATION_JSON: ${{ vars.VITE_APPLE_APP_SITE_ASSOCIATION_JSON }}
      VITE_APPLE_DEVELOPER_MERCHANTID_DOMAIN_ASSOCIATION: ${{ vars.VITE_APPLE_DEVELOPER_MERCHANTID_DOMAIN_ASSOCIATION }}

      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          package_json_file: apps/frontend/package.json
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Cache build caches
        uses: actions/cache@v6
        with:
          path: apps/frontend/node_modules/.cache
          key: build-cache-${{ matrix.environment }}-${{ github.run_id }}
          restore-keys: build-cache-${{ matrix.environment }}-

      - name: Deploy production
        if: matrix.environment == 'production'
        run: pnpm run production

      - name: Compute preview alias
        id: preview
        if: matrix.environment == 'canary'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            label="$PR_NUMBER"
          else
            label="${GITHUB_SHA::7}"
          fi
          echo "PREVIEW_LABEL=$label" >> "$GITHUB_ENV"
          echo "PREVIEW_ALIAS=git-$label" >> "$GITHUB_ENV"
          echo "url=https://$label.flirtual.dev" >> "$GITHUB_OUTPUT"

      - name: Upload preview version
        if: matrix.environment == 'canary'
        env:
          VITE_ORIGIN: https://${{ env.PREVIEW_LABEL }}.flirtual.dev
          VITE_API_URL: https://api-${{ env.PREVIEW_LABEL }}.flirtual.dev/v1/
        run: pnpm run preview "$PREVIEW_ALIAS"

      - name: Point flirtual.dev at this preview
        if: matrix.environment == 'canary' && github.ref == 'refs/heads/main'
        run: pnpm exec wrangler kv key put latest "$PREVIEW_LABEL" --binding=PREVIEW_STATE -c ../preview-router/wrangler.jsonc --remote

      - name: Post preview check
        if: matrix.environment == 'canary' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n --arg sha "$GITHUB_SHA" --arg url "https://$PREVIEW_LABEL.flirtual.dev" '{
            name: "preview",
            head_sha: $sha,
            status: "completed",
            conclusion: "success",
            output: { title: "Preview deployed", summary: "→ \($url)" }
          }' | gh api repos/${{ github.repository }}/check-runs --input -
